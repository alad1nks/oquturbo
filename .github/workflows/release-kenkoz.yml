name: Release kenkoz

on:
  push:
    branches: [ release/kenkoz/* ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KENKOZ_KEYSTORE_BASE64 }}" | base64 -d > release-key.jks

      - name: Run local tests
        run: ./gradlew test

      - name: Build AAB
        run: ./gradlew :app:kenkoz:androidApp:bundleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KENKOZ_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KENKOZ_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KENKOZ_KEYSTORE_PASSWORD }}
        if: success()

      - name: Rename AAB
        run: mv app/kenkoz/androidApp/build/outputs/bundle/release/androidApp-release.aab app/kenkoz/androidApp/build/outputs/bundle/release/kenkoz.aab
        if: success()

      - name: Upload AAB to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/kenkoz/androidApp/build/outputs/bundle/release/kenkoz.aab
        if: success()

  post-build:
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout io repository
        uses: actions/checkout@v4
        with:
          repository: 'alad1nks/alad1nks.github.io'
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: oquturbo/kenkoz/main

      - name: Commit AAB
        run: |
          git config --local user.name 'alad1nks'
          git config --local user.email 'alad1nks@users.noreply.github.com'
          git add oquturbo/kenkoz/main/*.aab
          git commit -m 'Add generated AAB file'
          git push
