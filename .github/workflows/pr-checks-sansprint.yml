name: PR checks sansprint

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'app/sansprint/**'
      - 'feature/remembernumber/**'
      - 'feature/remembernumbermenu/**'
      - 'feature/main/**'
      - 'core/**'
      - 'resources/**'
      - '.github/workflows/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run local tests
        run: ./gradlew test

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SANSPRINT_KEYSTORE_BASE64 }}" | base64 -d > release-key.jks

      - name: Build APK
        run: ./gradlew :app:sansprint:androidApp:assembleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SANSPRINT_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SANSPRINT_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SANSPRINT_KEYSTORE_PASSWORD }}
        if: success()

      - name: Rename APK
        run: mv app/sansprint/androidApp/build/outputs/apk/release/androidApp-release.apk app/sansprint/androidApp/build/outputs/apk/release/sansprint.apk
        if: success()

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/sansprint/androidApp/build/outputs/apk/release/sansprint.apk
        if: success()

  post-build-android:
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout io repository
        uses: actions/checkout@v4
        with:
          repository: 'alad1nks/alad1nks.github.io'
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: oquturbo/sansprint/${{ github.head_ref || github.ref_name }}

      - name: Commit APK
        run: |
          git config --local user.name 'alad1nks'
          git config --local user.email 'alad1nks@users.noreply.github.com'
          git add oquturbo/sansprint/${{ github.head_ref || github.ref_name }}/*.apk
          git commit -m 'Add generated APK file for sansprint'
          git push

  build-ios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build iOS
        run: ./gradlew :app:sansprint:shared:linkReleaseFrameworkIosArm64

  build-js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build js
        run: ./gradlew :app:sansprint:webApp:jsJar

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build wasm
        run: ./gradlew :app:sansprint:webApp:wasmJsJar

  build-jvm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jvm
        run: ./gradlew :app:sansprint:desktopApp:jar
